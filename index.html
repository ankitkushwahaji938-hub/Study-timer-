<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Study Timer – Ankit Study Point</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,229,160,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(30,136,229,.08) 0%,transparent 60%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;padding-bottom:24px;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.06);}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-name{font-size:14px;font-weight:900;color:rgba(255,255,255,.85);}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.hdr-date{font-size:12px;color:rgba(255,255,255,.3);font-weight:700;}
.modes{display:flex;gap:8px;padding:14px 20px 10px;flex-wrap:wrap;justify-content:center;}
.mp{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.38);cursor:pointer;transition:all .2s;}
.mp.on{background:linear-gradient(135deg,rgba(0,229,160,.15),rgba(0,188,212,.15));border-color:rgba(0,229,160,.4);color:#00e5a0;}
.cust-row{display:none;padding:0 20px 10px;gap:10px;justify-content:center;}
.cust-row.show{display:flex;}
.cinp{flex:1;max-width:130px;padding:10px 14px;background:#1a1a24;border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;outline:none;text-align:center;}
.cinp::placeholder{color:rgba(255,255,255,.2);}
.sbtn{padding:10px 18px;background:linear-gradient(135deg,#00e5a0,#00bcd4);color:#0a0a0f;border:none;border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;}
.clk-sec{display:flex;flex-direction:column;align-items:center;padding:20px 20px 14px;}
.plbl{font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(255,255,255,.28);text-transform:uppercase;margin-bottom:18px;}
.flip-clock{display:flex;align-items:flex-start;gap:12px;}
.cu{display:flex;flex-direction:column;align-items:center;gap:8px;}
.fp{display:flex;gap:5px;}
.fc{width:68px;height:86px;position:relative;border-radius:12px;overflow:hidden;background:#1a1a24;box-shadow:0 6px 24px rgba(0,0,0,.55);}
.ft{position:absolute;top:0;left:0;right:0;height:50%;background:#1e1e2a;border-radius:12px 12px 0 0;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;border-bottom:1.5px solid #0a0a0f;}
.fb{position:absolute;bottom:0;left:0;right:0;height:50%;background:#1a1a24;border-radius:0 0 12px 12px;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;}
.ft::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%);}
.fn{font-family:'Bebas Neue',sans-serif;font-size:70px;line-height:1;color:#eee;display:block;}
.ft .fn{transform:translateY(50%);margin-bottom:-2px;}
.fb .fn{transform:translateY(-50%);margin-top:-2px;}
@keyframes ft-anim{0%{transform:rotateX(0);}100%{transform:rotateX(-90deg);opacity:.25;}}
@keyframes fb-anim{0%{transform:rotateX(90deg);opacity:.25;}100%{transform:rotateX(0);}}
.fc.flip .ft{animation:ft-anim .22s ease-in forwards;transform-origin:center bottom;}
.fc.flip .fb{animation:fb-anim .22s ease-out .22s forwards;transform-origin:center top;}
.sep{font-family:'Bebas Neue',sans-serif;font-size:54px;color:rgba(255,255,255,.18);line-height:1;margin-top:4px;animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:.18;}50%{opacity:.65;};}
.ulbl{font-size:10px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,.2);text-transform:uppercase;}
.ctrl{display:flex;justify-content:center;align-items:center;gap:14px;padding:8px 20px 18px;}
.cb{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .15s;}
.cb:active{transform:scale(.88);}
.cbm{width:68px;height:68px;font-size:28px;}
.cbs{background:linear-gradient(135deg,#00e5a0,#00bcd4);color:#0a0a0f;box-shadow:0 6px 24px rgba(0,229,160,.35);}
.cbp{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;box-shadow:0 6px 24px rgba(243,156,18,.3);}
.cbn{background:#1a1a24;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);}
.stats{display:flex;gap:10px;padding:0 20px 16px;}
.sc{flex:1;background:#1a1a24;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:11px;text-align:center;}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#00e5a0;line-height:1;}
.sl{font-size:10px;font-weight:800;color:rgba(255,255,255,.25);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}
.div{height:1px;background:rgba(255,255,255,.06);margin:0 20px 16px;}
.gsec{padding:0 20px;}
.stitle{font-size:12px;font-weight:900;color:rgba(255,255,255,.28);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.stitle::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
.arow{display:flex;gap:10px;margin-bottom:12px;}
.ginp{flex:1;padding:11px 14px;background:#1a1a24;border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;outline:none;transition:border .2s;}
.ginp:focus{border-color:rgba(0,229,160,.4);}
.ginp::placeholder{color:rgba(255,255,255,.2);}
.abtn{width:44px;height:44px;background:linear-gradient(135deg,#00e5a0,#00bcd4);border:none;border-radius:12px;color:#0a0a0f;font-size:24px;font-weight:900;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.abtn:active{opacity:.82;}
.pw{display:none;margin-bottom:12px;}
.pw.show{display:block;}
.pb{height:4px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,#00e5a0,#00bcd4);border-radius:4px;transition:width .4s ease;}
.pt{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.25);font-weight:800;margin-top:5px;}
.glist{display:flex;flex-direction:column;gap:9px;}
.gi{background:#1a1a24;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:10px;transition:all .25s;}
.gi.done{background:linear-gradient(135deg,rgba(0,229,160,.05),rgba(0,188,212,.05));border-color:rgba(0,229,160,.18);}
.gck{width:26px;height:26px;border-radius:8px;background:#0a0a0f;border:2px solid rgba(255,255,255,.14);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;transition:all .2s;}
.gi.done .gck{background:linear-gradient(135deg,#00e5a0,#00bcd4);border-color:transparent;color:#0a0a0f;}
.gtxt{flex:1;font-size:14px;font-weight:700;color:rgba(255,255,255,.8);line-height:1.4;transition:all .2s;}
.gi.done .gtxt{text-decoration:line-through;color:rgba(255,255,255,.25);}
.gdel{width:30px;height:30px;background:rgba(231,76,60,.08);border:none;border-radius:8px;color:rgba(231,76,60,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.gdel:active{background:rgba(231,76,60,.2);}
.empty{text-align:center;padding:26px 20px;color:rgba(255,255,255,.18);font-size:14px;font-weight:700;}
.eico{font-size:36px;margin-bottom:10px;opacity:.28;}
.qcard{margin:16px 20px 0;padding:16px;background:linear-gradient(135deg,rgba(0,229,160,.05),rgba(30,136,229,.05));border:1px solid rgba(0,229,160,.09);border-radius:16px;text-align:center;}
.qtxt{font-size:13px;color:rgba(255,255,255,.45);line-height:1.65;font-style:italic;}
.qauth{font-size:11px;color:rgba(0,229,160,.5);font-weight:800;margin-top:6px;letter-spacing:1px;}
#popup{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(8px);}
#popup.show{display:flex;}
.pcard{background:#1a1a24;border:1px solid rgba(0,229,160,.18);border-radius:24px;padding:32px 24px;text-align:center;max-width:300px;width:90%;animation:ppin .4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes ppin{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.pico{font-size:60px;margin-bottom:12px;}
.ptitle{font-family:'Bebas Neue',sans-serif;font-size:34px;color:#00e5a0;margin-bottom:8px;}
.psub{font-size:14px;color:rgba(255,255,255,.42);line-height:1.55;margin-bottom:22px;}
.pbtn{width:100%;padding:14px;background:linear-gradient(135deg,#00e5a0,#00bcd4);color:#0a0a0f;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:#1e1e2a;border:1px solid rgba(0,229,160,.22);color:#00e5a0;padding:10px 22px;border-radius:12px;font-size:13px;font-weight:800;opacity:0;pointer-events:none;white-space:nowrap;transition:all .3s;z-index:9999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="popup"><div class="pcard"><div class="pico">🎉</div><div class="ptitle">Shabash!</div><div class="psub" id="pmsg">Session complete!</div><button class="pbtn" onclick="closePopup()">✨ Continue Padhai</button></div></div>
<div class="wrap">
<div class="hdr">
  <div class="hdr-l"><span style="font-size:22px">📚</span><div><div class="hdr-name">Study Timer</div><div class="hdr-sub">Ankit Study Point</div></div></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="hdr-date" id="hdate"></div>
    <button onclick="goFullScreen()" style="background:linear-gradient(135deg,#00e5a0,#00bcd4);color:#0a0a0f;border:none;border-radius:9px;padding:7px 11px;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap;" title="Full Screen">⛶</button>
  </div>
</div>
<div class="modes">
  <button class="mp on" onclick="setMode(25,5,'p',this)">🍅 25 min</button>
  <button class="mp" onclick="setMode(45,10,'d',this)">🧠 45 min</button>
  <button class="mp" onclick="setMode(15,5,'q',this)">⚡ 15 min</button>
  <button class="mp" onclick="setMode(0,0,'c',this)">⚙️ Custom</button>
</div>
<div class="cust-row" id="crow">
  <input class="cinp" type="number" id="cmin" placeholder="Minutes (1-180)"/>
  <button class="sbtn" onclick="applyC()">Set ✓</button>
</div>
<div class="clk-sec">
  <div class="plbl" id="plbl">📖 Focus Time</div>
  <div class="flip-clock">
    <div class="cu">
      <div class="fp">
        <div class="fc" id="fc0"><div class="ft"><span class="fn" id="d0t">2</span></div><div class="fb"><span class="fn" id="d0b">2</span></div></div>
        <div class="fc" id="fc1"><div class="ft"><span class="fn" id="d1t">5</span></div><div class="fb"><span class="fn" id="d1b">5</span></div></div>
      </div>
      <div class="ulbl">MIN</div>
    </div>
    <div class="sep">:</div>
    <div class="cu">
      <div class="fp">
        <div class="fc" id="fc2"><div class="ft"><span class="fn" id="d2t">0</span></div><div class="fb"><span class="fn" id="d2b">0</span></div></div>
        <div class="fc" id="fc3"><div class="ft"><span class="fn" id="d3t">0</span></div><div class="fb"><span class="fn" id="d3b">0</span></div></div>
      </div>
      <div class="ulbl">SEC</div>
    </div>
  </div>
</div>
<div class="ctrl">
  <button class="cb cbn" onclick="resetTimer()">↺</button>
  <button class="cb cbm cbs" id="mbtn" onclick="toggleTimer()">▶</button>
  <button class="cb cbn" onclick="skipPhase()">⏭</button>
</div>
<div class="stats">
  <div class="sc"><div class="sv" id="ss">0</div><div class="sl">Sessions</div></div>
  <div class="sc"><div class="sv" id="sm">0</div><div class="sl">Min Today</div></div>
  <div class="sc"><div class="sv" id="sg">0/0</div><div class="sl">Goals</div></div>
</div>
<div class="div"></div>
<div class="gsec">
  <div class="stitle">🎯 Aaj Ka Goal</div>
  <div class="arow">
    <input class="ginp" type="text" id="ginp" placeholder="e.g. Pharmacology Ch.3 padhna..." onkeydown="if(event.key==='Enter')addG()"/>
    <button class="abtn" onclick="addG()">+</button>
  </div>
  <div class="pw" id="pw"><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div><div class="pt"><span id="pdt">0 complete</span><span id="ppc">0%</span></div></div>
  <div class="glist" id="glist"><div class="empty"><div class="eico">🎯</div>Koi goal nahi abhi!<br/>Upar add karo.</div></div>
</div>
<div class="qcard"><div class="qtxt" id="qtxt"></div><div class="qauth">— Ankit Study Point</div></div>
</div>
<div id="toast"></div>
<script>
var fs=25*60,bs=5*60,rem=25*60,running=false,onbrk=false,tmr=null;
var sess=+(localStorage.getItem('asp_s')||0);
var goals=JSON.parse(localStorage.getItem('asp_g')||'[]');
var prev=['','','',''];
var QS=['"Ek din mein poora syllabus nahi hota, lekin roz thoda zaroor hota hai."','"Pharmacy padhai mein mehnat karo, results automatic aayenge."','"Focus karo. Ye time wapas nahi aata."','"D Pharma ho ya B Pharma, samajhne wala aage jaata hai."','"Notes padhna shuru karo — motivation khud aayega."','"Ek chapter, ek din — aise hi bana topper."'];
document.getElementById('qtxt').textContent=QS[Math.floor(Math.random()*QS.length)];
(function(){var d=new Date(),dy=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];document.getElementById('hdate').textContent=dy[d.getDay()]+', '+d.getDate()+' '+mn[d.getMonth()];})();
function td(){return new Date().toISOString().slice(0,10);}
function fc(i,v){if(prev[i]===v)return;prev[i]=v;document.getElementById('d'+i+'t').textContent=v;document.getElementById('d'+i+'b').textContent=v;var c=document.getElementById('fc'+i);c.classList.remove('flip');void c.offsetWidth;c.classList.add('flip');setTimeout(function(){c.classList.remove('flip');},500);}
function render(){var m=Math.floor(rem/60),s=rem%60;fc(0,''+Math.floor(m/10));fc(1,''+m%10);fc(2,''+Math.floor(s/10));fc(3,''+s%10);}
function toggleTimer(){running?pause():start();}
function start(){if(rem<=0)return;running=true;document.getElementById('mbtn').textContent='⏸';document.getElementById('mbtn').className='cb cbm cbp';tmr=setInterval(tick,1000);}
function pause(){running=false;clearInterval(tmr);document.getElementById('mbtn').textContent='▶';document.getElementById('mbtn').className='cb cbm cbs';toast('⏸ Paused');}
function tick(){if(rem>0){rem--;if(!onbrk&&rem%60===0){var m=+(localStorage.getItem('asp_m_'+td())||0)+1;localStorage.setItem('asp_m_'+td(),m);updateStats();}render();}else{clearInterval(tmr);running=false;phaseEnd();}}
function phaseEnd(){document.getElementById('mbtn').textContent='▶';document.getElementById('mbtn').className='cb cbm cbs';if(!onbrk){sess++;localStorage.setItem('asp_s',sess);updateStats();onbrk=true;rem=bs;document.getElementById('plbl').textContent='☕ Break Time';document.getElementById('pmsg').textContent='Bahut badhiya! '+Math.floor(fs/60)+' min session complete! Ab '+Math.floor(bs/60)+' min break lo.';document.getElementById('popup').classList.add('show');}else{onbrk=false;rem=fs;document.getElementById('plbl').textContent='📖 Focus Time';toast('☕ Break khatam! Focus karo.');}render();}
function resetTimer(){clearInterval(tmr);running=false;onbrk=false;rem=fs;document.getElementById('plbl').textContent='📖 Focus Time';document.getElementById('mbtn').textContent='▶';document.getElementById('mbtn').className='cb cbm cbs';render();toast('↺ Reset ho gaya');}
function skipPhase(){clearInterval(tmr);running=false;phaseEnd();}
function closePopup(){document.getElementById('popup').classList.remove('show');toast('☕ Break shuru!');}
function setMode(fm,bm,n,btn){document.querySelectorAll('.mp').forEach(function(p){p.classList.remove('on');});btn.classList.add('on');var cr=document.getElementById('crow');if(n==='c'){cr.classList.add('show');return;}cr.classList.remove('show');fs=fm*60;bs=bm*60;resetTimer();var lb={p:'🍅 25 min Pomodoro',d:'🧠 45 min Deep Work',q:'⚡ 15 min Quick'};toast('✅ '+lb[n]);}
function applyC(){var m=+document.getElementById('cmin').value;if(!m||m<1||m>180){toast('⚠️ 1-180 minute daalo');return;}fs=m*60;bs=Math.max(5,Math.floor(m*.2))*60;document.getElementById('crow').classList.remove('show');resetTimer();toast('⚙️ '+m+' min set!');}
function addG(){var inp=document.getElementById('ginp'),txt=inp.value.trim();if(!txt){toast('⚠️ Goal likho!');return;}goals.push({id:Date.now(),text:txt,done:false,date:td()});inp.value='';saveG();renderG();toast('✅ Goal add!');}
function toggleG(id){var g=goals.find(function(x){return x.id===id;});if(!g)return;g.done=!g.done;saveG();renderG();if(g.done)toast('🎉 Goal complete! Shabash!');}
function delG(id){goals=goals.filter(function(x){return x.id!==id;});saveG();renderG();toast('🗑️ Hata diya');}
function saveG(){localStorage.setItem('asp_g',JSON.stringify(goals));}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderG(){var tg=goals.filter(function(g){return g.date===td();}),list=document.getElementById('glist'),pw=document.getElementById('pw');if(!tg.length){list.innerHTML='<div class="empty"><div class="eico">🎯</div>Koi goal nahi abhi!<br/>Upar add karo.</div>';pw.classList.remove('show');updateStats();return;}var done=tg.filter(function(g){return g.done;}).length,pct=Math.round(done/tg.length*100);pw.classList.add('show');document.getElementById('pf').style.width=pct+'%';document.getElementById('pdt').textContent=done+' complete';document.getElementById('ppc').textContent=pct+'%';list.innerHTML=tg.map(function(g){return'<div class="gi '+(g.done?'done':'')+'"><div class="gck" onclick="toggleG('+g.id+')">'+(g.done?'✓':'')+'</div><div class="gtxt">'+esc(g.text)+'</div><button class="gdel" onclick="delG('+g.id+')">🗑</button></div>';}).join('');updateStats();}
function updateStats(){document.getElementById('ss').textContent=sess;document.getElementById('sm').textContent=+(localStorage.getItem('asp_m_'+td())||0);var tg=goals.filter(function(g){return g.date===td();});document.getElementById('sg').textContent=tg.filter(function(g){return g.done;}).length+'/'+tg.length;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
render();renderG();updateStats();
var cut=new Date();cut.setDate(cut.getDate()-7);goals=goals.filter(function(g){return new Date(g.date||td())>=cut;});saveG();

// Full Screen Function
function goFullScreen(){
  var el = document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen) el.mozRequestFullScreen();
  else if(el.msRequestFullscreen) el.msRequestFullscreen();
  // Fallback: open in new tab
  else window.open(window.location.href, '_blank');
  toast('⛶ Full Screen mode!');
}
// Exit fullscreen on double tap
document.addEventListener('dblclick', function(){
  if(document.fullscreenElement){
    document.exitFullscreen();
    toast('⊠ Normal mode');
  }
});
</script>
</body>
</html>
